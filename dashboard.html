<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — LockedIn</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z'/></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #eff6ff;
            --accent: #8b5cf6;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --font-logo: 'Sora', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text-main); }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 48px; display: flex; align-items: center; justify-content: space-between;
            height: 70px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .nav-logo {
            font-family: var(--font-logo); font-size: 24px; font-weight: 800;
            display: flex; align-items: center; gap: 12px; text-decoration: none;
        }
        .nav-logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); font-size: 22px;
        }
        .nav-logo-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-link {
            color: var(--text-muted); text-decoration: none; font-weight: 500;
            font-size: 14px; padding: 10px 16px; border-radius: 10px; transition: all 0.3s;
        }
        .nav-link:hover { color: var(--primary); background: var(--primary-light); }
        .nav-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid var(--primary); object-fit: cover;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        .btn {
            padding: 10px 24px; border-radius: 12px; font-weight: 600;
            font-size: 14px; cursor: pointer; transition: all 0.3s; border: none;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--font-body);
        }
        .btn-outline {
            background: white; color: var(--primary); border: 2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-outline:hover {
            border-color: var(--primary); background: var(--primary-light);
            transform: translateY(-2px);
        }

        .dash-container { max-width: 1400px; margin: 0 auto; padding: 32px 48px; }

        .dash-header {
            background: white; border-radius: 20px; padding: 32px;
            margin-bottom: 32px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 2px solid var(--border);
        }
        .dash-header h1 {
            font-family: var(--font-heading); font-size: 32px; margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;
        }
        .stat-card {
            background: white; border-radius: 16px; padding: 24px;
            border: 2px solid var(--border); transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
        .stat-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 16px;
        }
        .stat-value {
            font-size: 32px; font-weight: 700; color: var(--text-main);
            font-family: var(--font-heading); margin-bottom: 4px;
        }
        .stat-label {
            font-size: 13px; color: var(--text-muted); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .tabs {
            background: white; border-radius: 16px; padding: 20px;
            border: 2px solid var(--border); margin-bottom: 24px;
        }
        .tab-menu {
            display: flex; gap: 8px; list-style: none; flex-wrap: wrap;
        }
        .tab-menu li {
            padding: 10px 20px; border-radius: 10px; cursor: pointer;
            font-size: 14px; font-weight: 600; color: var(--text-muted);
            transition: all 0.3s;
        }
        .tab-menu li:hover { background: var(--bg); color: var(--primary); }
        .tab-menu li.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .tab-content {
            background: white; border-radius: 16px; padding: 32px;
            border: 2px solid var(--border); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .notes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .note-card {
            background: white; border: 2px solid var(--border); border-radius: 16px;
            padding: 24px; transition: all 0.3s;
        }
        .note-card:hover {
            transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-color: var(--primary);
        }
        .note-card h3 {
            font-family: var(--font-heading); font-size: 18px; margin-bottom: 12px;
        }
        .note-actions {
            display: flex; gap: 8px; margin-top: 16px;
        }
        .note-actions button {
            flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--border);
            background: white; color: var(--text-muted); font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-size: 13px;
        }
        .note-actions button:hover {
            border-color: var(--primary); color: var(--primary); background: var(--primary-light);
        }

        .upload-card {
            grid-column: 1/-1; background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            border: 2px dashed var(--primary); border-radius: 16px; padding: 48px;
            text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .upload-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15); }
        .upload-icon {
            width: 64px; height: 64px; margin: 0 auto 16px;
            background: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 28px;
            color: var(--primary);
        }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: 20px; padding: 40px;
            max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h2 {
            font-family: var(--font-heading); font-size: 24px;
        }
        .close-btn {
            background: none; border: none; font-size: 24px; cursor: pointer;
            color: var(--text-muted); padding: 0; width: 32px; height: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block; margin-bottom: 8px; font-weight: 600;
            color: var(--text-main); font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 14px; font-family: var(--font-body);
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--primary); background: var(--primary-light);
        }
        .file-drop {
            border: 2px dashed var(--border); border-radius: 12px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.3s;
            background: var(--bg);
        }
        .file-drop:hover { border-color: var(--primary); background: var(--primary-light); }
        .file-drop.drag-over { border-color: var(--primary); background: var(--primary-light); }

        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-muted);
        }
        .empty-state i { font-size: 64px; opacity: 0.2; margin-bottom: 20px; }

        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media(max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .notes-grid { grid-template-columns: 1fr; }
            nav, .dash-container { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <span class="nav-logo-text">LockedIn</span>
    </a>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html" class="nav-link">Browse Notes</a>
        <a href="#" id="logoutBtn" class="btn btn-outline">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
        <img src="" id="userAvatar" class="nav-avatar" alt="User" style="display:none;">
    </div>
</nav>

<div class="dash-container">
    <div class="dash-header">
        <h1>👋 Welcome back, <span id="userName">Loading...</span></h1>
        <p style="color: var(--text-muted); margin-top: 8px;">Here's your activity overview</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            <div class="stat-value" id="stat-notes">—</div>
            <div class="stat-label">Notes Uploaded</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-book"></i></div>
            <div class="stat-value" id="stat-subjects">—</div>
            <div class="stat-label">Subjects</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-value" id="stat-hours">—</div>
            <div class="stat-label">Study Hours</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-eye"></i></div>
            <div class="stat-value" id="stat-views">—</div>
            <div class="stat-label">Total Views</div>
        </div>
    </div>

    <div class="tabs">
        <ul class="tab-menu" id="tab-menu">
            <li class="active" onclick="switchTab('my-notes')"><i class="fas fa-file-alt"></i> My Notes</li>
            <li onclick="switchTab('bookmarks')"><i class="fas fa-bookmark"></i> Bookmarks</li>
            <li onclick="switchTab('activity')"><i class="fas fa-chart-line"></i> Activity</li>
        </ul>
    </div>

    <div class="tab-content">
        <div id="my-notes" class="tab-pane active">
            <div class="notes-grid" id="notes-container">
                <div class="spinner"></div>
            </div>
        </div>

        <div id="bookmarks" class="tab-pane">
            <div class="notes-grid" id="bookmarks-container">
                <div class="spinner"></div>
            </div>
        </div>

        <div id="activity" class="tab-pane">
            <div id="activity-container">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📤 Upload Note</h2>
            <button class="close-btn" onclick="closeUploadModal()">×</button>
        </div>
        <form id="upload-form">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" required placeholder="e.g., Physics Chapter 5 Notes">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <select name="subject" required>
                    <option value="">Select subject</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Math">Math</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Biology">Biology</option>
                    <option value="Literature">Literature</option>
                    <option value="Economics">Economics</option>
                    <option value="History">History</option>
                    <option value="English">English</option>
                    <option value="Geography">Geography</option>
                </select>
            </div>
            <div class="form-group">
                <label>Grade</label>
                <select name="grade" required>
                    <option value="">Select grade</option>
                    <option value="Grade 11">Grade 11</option>
                    <option value="Grade 12">Grade 12</option>
                </select>
            </div>
            <div class="form-group">
                <label>PDF File</label>
                <div class="file-drop" id="file-drop-area">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--primary); margin-bottom: 16px;"></i>
                    <p style="margin-bottom: 8px; font-weight: 600;">Click to browse or drag & drop</p>
                    <p style="font-size: 12px; color: var(--text-muted);">PDF files only, max 10MB</p>
                    <input type="file" id="pdf-file" name="pdf_file" accept=".pdf" style="display:none;" required>
                </div>
                <p id="file-name" style="margin-top: 8px; font-size: 13px; color: var(--primary);"></p>
            </div>
            <div id="upload-status"></div>
            <button type="submit" class="btn btn-outline" id="upload-btn" style="width: 100%; justify-content: center; padding: 14px;">
                <i class="fas fa-upload"></i> Upload Note
            </button>
        </form>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
