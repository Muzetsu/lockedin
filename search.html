<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Notes — LockedIn</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z'/></svg>">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #eff6ff;
            --accent: #8b5cf6;
            --accent-light: #f5f3ff;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
            --font-logo: 'Sora', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        body { font-family:var(--font-body); background:var(--bg); color:var(--text-main); min-height:100vh; position: relative; }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -15%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        nav {
            position:sticky; top:0; z-index:100;
            background:rgba(255,255,255,0.95); backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(226, 232, 240, 0.8); padding:0 48px;
            display:flex; align-items:center; justify-content:space-between;
            height:70px; box-shadow:0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .nav-logo {
            font-family: var(--font-logo);
            font-size: 24px; font-weight: 800;
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-logo:hover {
            transform: scale(1.05);
        }
        .nav-logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            font-size: 22px;
        }
        .nav-logo-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links { display:flex; align-items:center; gap:8px; }
        .nav-link { 
            color:var(--text-muted); text-decoration:none; font-weight:500; 
            font-size:14px; padding:10px 16px; border-radius:10px; transition:all 0.3s; 
        }
        .nav-link:hover, .nav-link.active { 
            color:var(--primary); 
            background: linear-gradient(135deg, var(--primary-light), rgba(239, 246, 255, 0.5));
        }
        .btn { 
            padding:10px 24px; border-radius:12px; font-weight:600; 
            font-size:14px; cursor:pointer; transition:all 0.3s; border:none; 
            text-decoration:none; display:inline-flex; align-items:center; gap:8px; 
            font-family:var(--font-body); 
        }
        .btn-outline { 
            background:white; color:var(--primary); 
            border:2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-outline:hover { 
            border-color:var(--primary); 
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color:white; 
            box-shadow:0 4px 16px rgba(59,130,246,0.3); 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow:0 8px 24px rgba(59,130,246,0.4); 
        }

        .page-top {
            background: linear-gradient(135deg, white 0%, rgba(239, 246, 255, 0.5) 100%);
            border-bottom:1px solid var(--border);
            padding:48px 48px 0;
            position: relative;
        }
        .page-top::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .page-top-inner { max-width:1200px; margin:0 auto; position: relative; z-index: 1; }
        .page-top-row { 
            display:flex; align-items:flex-end; justify-content:space-between; 
            gap:20px; flex-wrap:wrap; margin-bottom:32px; 
        }
        .page-heading h1 { 
            font-family: var(--font-heading);
            font-size:40px; font-weight:700; 
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom:8px; 
            letter-spacing: -0.5px;
        }
        .page-heading p { font-size:16px; color:var(--text-muted); }

        .search-row {
            display:flex; align-items:center; gap:14px; flex-wrap:wrap;
            padding-bottom:24px;
        }
        .search-box {
            flex:1; min-width:280px; position:relative;
        }
        .search-box i { 
            position:absolute; left:16px; top:50%; transform:translateY(-50%); 
            color:var(--text-muted); font-size:15px; 
        }
        .search-box input {
            width:100%; padding:14px 18px 14px 48px;
            border:2px solid var(--border); border-radius:14px;
            font-family:var(--font-body); font-size:15px; color:var(--text-main);
            background:white; transition:all 0.3s; outline:none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .search-box input:focus { 
            border-color:var(--primary); 
            background:white; 
            box-shadow:0 4px 16px rgba(59,130,246,0.15); 
        }

        .filter-pills { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .pill {
            padding:10px 20px; border-radius:50px; font-size:13px; font-weight:600;
            border:2px solid var(--border); background:white; color:var(--text-muted);
            cursor:pointer; transition:all 0.3s; white-space:nowrap; 
            font-family:var(--font-body);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .pill:hover { 
            border-color:var(--primary); color:var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        .pill.active { 
            border-color:var(--primary); color:white; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .main-wrap { max-width:1200px; margin:0 auto; padding:32px 48px 80px; position: relative; z-index: 1; }
        .results-count { 
            font-size:14px; color:var(--text-muted); font-weight:600;
            padding: 10px 18px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom:24px;
            display: inline-block;
        }
        .notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; }
        .note-card {
            background:white; 
            border:2px solid rgba(241, 245, 249, 0.8); 
            border-radius:20px;
            padding:28px; transition:all 0.4s; cursor:pointer;
            box-shadow:0 4px 16px rgba(0, 0, 0, 0.04); 
            display:flex; flex-direction:column; gap:14px;
            position: relative;
            overflow: hidden;
        }
        .note-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .note-card:hover { 
            transform:translateY(-8px); 
            box-shadow:0 16px 32px rgba(0, 0, 0, 0.08); 
            border-color:rgba(59, 130, 246, 0.3);
        }
        .note-card:hover::before {
            transform: scaleX(1);
        }
        .subject-pill {
            display:inline-flex; align-items:center; gap:6px;
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            color:var(--primary);
            padding:6px 14px; border-radius:50px; font-size:11px; font-weight:700;
            text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .note-title { 
            font-family: var(--font-heading);
            font-size:18px; font-weight:600; color:var(--text-main); 
            line-height:1.4; letter-spacing: -0.3px;
        }
        .note-stats { display:flex; gap:14px; }
        .note-stat { 
            display:flex; align-items:center; gap:6px; 
            font-size:12px; color:var(--text-muted); font-weight: 600;
        }
        .note-stat i { color:var(--primary); }
        .act-btn {
            flex:1; padding:12px; border-radius:12px; border:2px solid var(--border);
            background:white; color:var(--text-muted);
            font-family:var(--font-body); font-size:13px; font-weight:600;
            cursor:pointer; transition:all 0.3s; 
            display:flex; align-items:center; justify-content:center; gap:7px;
            text-decoration:none;
        }
        .act-btn:hover { 
            border-color:var(--primary); color:var(--primary); 
            background: linear-gradient(135deg, var(--primary-light), #f0f9ff);
            transform: translateY(-2px);
        }
        .loading-state, .empty-state {
            grid-column:1/-1; text-align:center; padding:100px 20px; color:var(--text-muted);
        }
        .spinner { 
            width:50px; height:50px; 
            border:4px solid #e2e8f0; border-top:4px solid var(--primary); 
            border-radius:50%; animation:spin 1s linear infinite; 
            margin:0 auto 20px; 
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <span class="nav-logo-text">LockedIn</span>
    </a>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html" class="nav-link active">Browse Notes</a>
        <a href="https://lockedin.ct.ws/login.php" class="btn btn-outline">Sign In</a>
        <a href="https://lockedin.ct.ws/login.php" class="btn btn-primary">
            <i class="fas fa-rocket"></i> Join Free
        </a>
    </div>
</nav>

<div class="page-top">
    <div class="page-top-inner">
        <div class="page-top-row">
            <div class="page-heading">
                <h1>🔍 Browse Notes</h1>
                <p>Discover notes shared by the LockedIn community</p>
            </div>
        </div>

        <div class="search-row" style="margin-bottom:16px;">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by title, subject or grade...">
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding-bottom:24px;">
            <div class="filter-pills" id="filterPills">
                <button class="pill active" data-subject="">All Subjects</button>
                <button class="pill" data-subject="Physics">Physics</button>
                <button class="pill" data-subject="Chemistry">Chemistry</button>
                <button class="pill" data-subject="Math">Math</button>
                <button class="pill" data-subject="Computer Science">Computer Science</button>
                <button class="pill" data-subject="Biology">Biology</button>
            </div>
        </div>
    </div>
</div>

<div class="main-wrap">
    <span class="results-count" id="resultsCount">Loading...</span>
    <div class="notes-grid" id="notesGrid">
        <div class="loading-state"><div class="spinner"></div><p>Loading notes...</p></div>
    </div>
</div>

<script>
    const API_BASE = 'https://lockedin.ct.ws';
    let currentSub = '';
    let currentQ = '';

    document.querySelectorAll('.pill').forEach(p => {
        p.addEventListener('click', () => {
            document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
            p.classList.add('active');
            currentSub = p.dataset.subject;
            loadNotes();
        });
    });

    document.getElementById('searchInput').addEventListener('input', function() {
        currentQ = this.value.trim();
        setTimeout(loadNotes, 350);
    });

    function loadNotes() {
        const grid = document.getElementById('notesGrid');
        grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading notes...</p></div>';

        let url = `${API_BASE}/search_api.php?`;
        if (currentQ) url += 'q=' + encodeURIComponent(currentQ) + '&';
        if (currentSub) url += 'subject=' + encodeURIComponent(currentSub) + '&';

        fetch(url, { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                const notes = data.notes || [];
                renderNotes(notes);
            })
            .catch(err => {
                console.error('Load error:', err);
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Could not load notes</h3><p>Check your connection</p></div>';
            });
    }

    function renderNotes(notes) {
        const grid = document.getElementById('notesGrid');
        const count = document.getElementById('resultsCount');
        count.textContent = notes.length === 0 ? 'No notes found' : `${notes.length} note${notes.length !== 1 ? 's' : ''} found`;

        if (!notes.length) {
            grid.innerHTML = `<div class="empty-state">
                <i class="fas fa-search"></i>
                <h3>No notes found</h3>
                <p>Try a different search term or subject</p>
            </div>`;
            return;
        }

        grid.innerHTML = notes.map(n => `
            <div class="note-card">
                <span class="subject-pill"><i class="fas fa-book-open"></i> ${esc(n.subject || 'General')}</span>
                <div class="note-title">${esc(n.title || 'Untitled')}</div>
                <div class="note-stats">
                    <span class="note-stat"><i class="fas fa-eye"></i> ${n.views || 0} views</span>
                </div>
                <div style="display:flex;gap:10px;margin-top:10px;">
                    <a href="${esc(n.file_path || '#')}" target="_blank" class="act-btn">
                        <i class="fas fa-eye"></i> View PDF
                    </a>
                </div>
            </div>
        `).join('');

        gsap.fromTo('.note-card', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.08, ease: 'power2.out' });
    }

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = String(str);
        return d.innerHTML;
    }

    loadNotes();
</script>
</body>
</html>
